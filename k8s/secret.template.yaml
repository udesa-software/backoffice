apiVersion: v1
kind: Secret
metadata:
  name: backoffice-secret
  namespace: udesamigos
type: Opaque
stringData:
  DB_HOST: "${DB_HOST}"
  DB_NAME: "${BACKOFFICE_DB_NAME}"
  DB_USER: "${BACKOFFICE_DB_USER}"
  DB_PASSWORD: "${BACKOFFICE_DB_PASSWORD}"

  # JWT_SECRET del backoffice debe ser DIFERENTE al de users (por diseño del sistema)
  JWT_SECRET: "${BACKOFFICE_JWT_SECRET}"

  SMTP_HOST: "${SMTP_HOST}"
  SMTP_USER: "${SMTP_USER}"
  SMTP_PASS: "${SMTP_PASS}"

  INITIAL_SUPERADMIN_TEMP_PASSWORD: "${BACKOFFICE_SUPERADMIN_TEMP_PASSWORD}"
